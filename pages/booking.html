<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد - مستشفى الحياة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/doctor.css">
    <style>
        .booking-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            margin: 40px auto;
        }
        @media (max-width: 768px) {
            .booking-container { grid-template-columns: 1fr; }
        }

        /* بطاقة الطبيب */
        .doctor-info-card {
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            position: sticky;
            top: 80px;
            height: fit-content;
        }
        .doctor-info-card img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-color);
            margin-bottom: 12px;
        }
        .doctor-info-card h3 {
            color: var(--primary-color);
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        .doctor-info-card .doc-title {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .doc-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.9rem;
        }
        .doc-info-row:last-child { border-bottom: none; }
        .doc-info-row strong { color: var(--primary-color); }
        .doc-bio {
            background: rgba(14,94,111,0.06);
            border-radius: 10px;
            padding: 12px;
            margin-top: 15px;
            font-size: 0.88rem;
            color: #555;
            text-align: right;
            line-height: 1.7;
        }

        /* فورم الحجز */
        .booking-form-card { padding: 30px; border-radius: 15px; }

        /* أوقات الكشف */
        .day-slots-group { margin-bottom: 20px; }
        .day-slots-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 0.95rem;
            background: rgba(14,94,111,0.07);
            padding: 8px 12px;
            border-radius: 8px;
        }
        .day-slots-label span {
            font-size: 0.82rem;
            color: #888;
            font-weight: 400;
        }
        .slots-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .time-slot {
            padding: 8px 16px;
            background: white;
            border: 2px solid var(--primary-color);
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-color);
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        .time-slot:hover { background: var(--primary-color); color: white; transform: scale(1.05); }
        .time-slot.selected {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 12px rgba(14,94,111,0.35);
        }
        .time-slot.booked {
            background: #f5f5f5;
            border-color: #ddd;
            color: #bbb;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        .selected-time-badge {
            display: none;
            margin-top: 12px;
            padding: 10px 15px;
            background: rgba(14,94,111,0.08);
            border-radius: 8px;
            border-right: 4px solid var(--primary-color);
            font-size: 0.9rem;
        }
        .selected-time-badge.show { display: block; }

        /* الدفع */
        .payment-card {
            background: rgba(14, 94, 111, 0.05);
            border: 2px dashed var(--primary-color);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
        }

        #imagePreview {
            max-width: 100%;
            height: auto;
            margin-top: 15px;
            border-radius: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="loader-wrapper"><div class="loader"></div></div>

    <!-- شريط التنقل -->
    <nav class="navbar">
        <div class="container">
            <a href="home.html" class="navbar-brand">
                <i class="fa-solid fa-heart-pulse"></i> مستشفى الحياة
            </a>
            <div class="menu-toggle"><i class="fa-solid fa-bars"></i></div>
            <ul class="nav-links">
                <li><a href="home.html">الرئيسية</a></li>
                <li><a href="user-bookings.html">حجوزاتي</a></li>
                <li><a href="contact.html">تواصل معنا</a></li>
                <li><a href="#" id="navbar-username" class="user-name-badge"></a></li>
                <li><a href="#" id="navbar-auth-link" class="btn btn-outline" style="padding: 5px 15px; border-radius: 15px;">تسجيل الدخول</a></li>
            </ul>
        </div>
    </nav>

    <!-- واجهة الحجز -->
    <div class="container booking-container">
        <!-- بطاقة الطبيب -->
        <div id="doctorInfoCard" class="doctor-info-card glass-panel"></div>

        <!-- فورم الحجز -->
        <div class="booking-form-card glass-panel">
            <h3 style="color: var(--primary-color); margin-bottom: 25px;">
                <i class="fa-solid fa-calendar-plus"></i> استكمال الحجز
            </h3>
            <form id="bookingForm">
                
                <div class="form-group">
                    <label>نوع الكشف</label>
                    <select id="visitType" class="form-control" required>
                        <option value="">-- اختر نوع الكشف --</option>
                        <option value="عادي">كشف عادي</option>
                        <option value="مستعجل">كشف مستعجل</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fa-regular fa-clock"></i> اختر الموعد المناسب</label>
                    <div id="timeSlotsContainer">
                        <!-- سيتم توليد المواعيد بواسطة JS -->
                    </div>
                    <div id="selectedTimeBadge" class="selected-time-badge">
                        <i class="fa-solid fa-circle-check" style="color:var(--primary-color);"></i>
                        <strong> الموعد المختار: </strong>
                        <span id="selectedTimeText"></span>
                    </div>
                    <input type="hidden" id="selectedTime">
                </div>

                <!-- طريقة الدفع -->
                <div class="payment-card">
                    <h4><i class="fa-solid fa-wallet"></i> طريقة الدفع</h4>
                    <p style="margin: 10px 0;">يرجى تحويل مبلغ الكشف عبر فودافون كاش إلى الرقم التالي:</p>
                    <h2 style="color: var(--success-color); letter-spacing: 3px; margin: 10px 0;">01149519736</h2>
                    <p style="font-size: 0.85rem; color: #666;">(مبلغ الكشف يحدد بناءً على النوع المختار)</p>
                    <div class="form-group" style="text-align: right; margin-top: 20px;">
                        <label>رفع صورة إيصال الدفع <span style="font-size:0.8rem;color:#999;">(الحد الأقصى 1MB)</span></label>
                        <input type="file" id="paymentReceipt" class="form-control" accept="image/*" required>
                        <img id="imagePreview" alt="معاينة الإيصال">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="margin-top: 25px; font-size: 1.05rem; padding: 14px;">
                    <i class="fa-solid fa-circle-check"></i> تأكيد الحجز
                </button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer glass-panel" style="text-align:center;">
        <div class="container" style="text-align:center;">
            <p>&copy; 2026 مستشفى الحياة. جميع الحقوق محفوظة.</p>
            <div style="margin-top: 15px; font-weight: bold; color: var(--primary-color);">Made By Mohamed Ibrahim</div>
        </div>
    </footer>

    <script src="../js/doctors.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/booking.js"></script>
</body>
</html>
