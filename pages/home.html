<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - مستشفى الحياة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/doctor.css">
</head>
<body>

    <!-- شاشة التحميل -->
    <div class="loader-wrapper">
        <div class="loader"></div>
    </div>

    <!-- شريط التنقل -->
    <nav class="navbar">
        <div class="container">
            <a href="home.html" class="navbar-brand">
                <i class="fa-solid fa-heart-pulse"></i>
                مستشفى الحياة
            </a>
            <div class="menu-toggle">
                <i class="fa-solid fa-bars"></i>
            </div>
            <ul class="nav-links">
                <li><a href="home.html" class="active">الرئيسية</a></li>
                <li><a href="home.html#specialties">التخصصات</a></li>
                <li><a href="contact.html">تواصل معنا</a></li>
                <li><a href="#" id="navbar-username" class="user-name-badge"></a></li>
                <li><a href="#" id="navbar-auth-link" class="btn btn-outline" style="padding: 5px 15px; border-radius: 15px;">تسجيل الدخول</a></li>
            </ul>
        </div>
    </nav>

    <!-- البانر الرئيسي -->
    <header class="hero-section">
        <div class="container hero-content">
            <div class="glass-panel hero-box">
                <h1>رعايتك الصحية، بين أيادٍ أمينة</h1>
                <p>نقدم لك أفضل الخدمات الطبية بأحدث التقنيات مع نخبة من الاستشاريين والأخصائيين.</p>
                <a href="#specialties" class="btn btn-primary">احجز موعدك الآن</a>
            </div>
        </div>
    </header>

    <!-- قسم التخصصات الطبية -->
    <section id="specialties" class="specialties-section">
        <div class="container">
            <div class="section-title">
                <h2>التخصصات الطبية</h2>
                <div class="underline"></div>
            </div>
            
            <div class="specialties-grid" id="specialtiesContainer">
                <!-- سيتم حقن التخصصات هنا عن طريق الجافاسكريبت -->
            </div>
        </div>
    </section>

    <!-- Footer بسيط -->
    <footer class="footer glass-panel">
        <div class="container">
            <p>&copy; 2026 مستشفى الحياة. جميع الحقوق محفوظة.</p>
            <div style="margin-top: 15px; font-weight: bold; color: var(--primary-color);">Made By Mohamed Ibrahim</div>
        </div>
    </footer>

    <script src="../js/doctors.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('specialtiesContainer');
            try {
                const response = await fetch('http://localhost:5000/api/specialties');
                const data = await response.json();
                const specialties = data.data;

                if (specialties && specialties.length > 0) {
                    container.innerHTML = specialties.map(spec => {
                        const imgSrc = spec.image === 'default-specialty.png' ? '../images/default.jpg' : `http://localhost:5000/uploads/${spec.image}`;
                        return `
                        <div class="specialty-card glass-panel">
                            <div class="specialty-img">
                                <img src="${imgSrc}" alt="${spec.name}">
                            </div>
                            <div class="specialty-info">
                                <h3>${spec.name}</h3>
                                <p>${spec.description}</p>
                                <a href="specialty.html?id=${spec._id}" class="btn btn-outline btn-block">عرض الأطباء</a>
                            </div>
                        </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<p style="text-align:center; width:100%; color:#555;">لا توجد تخصصات متاحة حالياً.</p>';
                }
            } catch (err) {
                console.error("Error fetching specialties:", err);
                container.innerHTML = '<p style="text-align:center; width:100%; color:red;">خطأ في الاتصال بالخادم. تأكد من تشغيل الـ Backend.</p>';
            }
        });
    </script>
</body>
</html>
