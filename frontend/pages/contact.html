    <style>
        .contact-container {
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            padding: 40px;
        }
        .contact-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }
        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            transition: transform 0.3s;
        }
        .contact-btn:hover {
            transform: scale(1.05);
        }
        .btn-whatsapp {
            background-color: #25D366;
        }
        .btn-facebook {
            background-color: #1877F2;
        }
        .made-by {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.05);
            font-weight: bold;
            color: var(--primary-color);
            margin-top: 50px;
        }
